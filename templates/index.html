<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalentIntel AI | Dark Mode</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0f172a',
                        cardBg: '#1e293b',
                        accentBlue: '#6366f1',
                    },
                    animation: {
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #0f172a; 
            color: #f8fafc;
            overflow-x: hidden;
        }
        .ai-gradient-border {
            background: linear-gradient(#1e293b, #1e293b) padding-box,
                        linear-gradient(to right, #6366f1, #a855f7) border-box;
            border: 2px solid transparent;
        }
        .glow {
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
        }
        /* Page Load Animation */
        .fade-in { animation: fadeIn 0.8s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-10 px-4">

    <div class="fixed top-0 left-0 w-96 h-96 bg-indigo-600/10 rounded-full blur-[120px] -z-10 animate-pulse-slow"></div>
    <div class="fixed bottom-0 right-0 w-96 h-96 bg-purple-600/10 rounded-full blur-[120px] -z-10"></div>

    <header class="w-full max-w-5xl flex justify-between items-center mb-16 fade-in">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center glow">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
            </div>
            <h1 class="text-xl font-bold tracking-tight">TalentIntel <span class="text-indigo-400">AI</span></h1>
        </div>
        <div class="flex items-center gap-6">
            <div class="text-right">
                <p class="text-[10px] text-slate-500 uppercase tracking-widest font-bold">Recruiter</p>
                <p class="text-sm font-medium text-slate-300">{{ user }}</p>
            </div>
            <a href="/logout" class="bg-slate-800 hover:bg-red-500/10 hover:text-red-400 text-slate-400 px-5 py-2 rounded-xl text-xs font-bold transition-all border border-slate-700">LOGOUT</a>
        </div>
    </header>

    <main class="w-full max-w-3xl fade-in" style="animation-delay: 0.2s;">
        <div class="ai-gradient-border rounded-[2.5rem] p-8 md:p-12 shadow-2xl bg-cardBg/50 backdrop-blur-xl">
            
            <div class="mb-10 text-center">
                <span class="bg-indigo-500/10 text-indigo-400 text-[10px] font-black px-4 py-1.5 rounded-full tracking-[0.2em] uppercase border border-indigo-500/20">Advanced BERT Analysis</span>
                <h2 class="text-4xl font-extrabold mt-4 bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent italic">Analyze Candidates</h2>
            </div>

            <form id="uploadForm" class="space-y-8">
                <div class="space-y-3">
                    <label class="text-xs font-bold text-slate-400 uppercase tracking-widest ml-1">Target Job Description</label>
                    <textarea id="jd" rows="4" class="w-full rounded-2xl bg-darkBg/50 border border-slate-700 p-5 text-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all outline-none placeholder:text-slate-600" placeholder="Describe the ideal candidate..."></textarea>
                </div>

                <div class="space-y-3">
                    <label class="text-xs font-bold text-slate-400 uppercase tracking-widest ml-1">Resume Upload (PDF)</label>
                    <div class="relative group cursor-pointer">
                        <input type="file" id="resume" accept=".pdf" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
                        <div class="border-2 border-dashed border-slate-700 rounded-3xl p-10 text-center group-hover:border-indigo-500 group-hover:bg-indigo-500/5 transition-all">
                            <div class="w-14 h-14 bg-slate-800 rounded-2xl flex items-center justify-center mx-auto mb-4 group-hover:scale-110 transition-transform">
                                <svg class="w-6 h-6 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
                            </div>
                            <p id="fileNameDisplay" class="text-sm font-semibold text-slate-300">Drop resume here or click</p>
                            <p class="text-[10px] text-slate-500 mt-2">Max size: 5MB</p>
                        </div>
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="w-full py-4 bg-indigo-600 hover:bg-indigo-500 text-white rounded-2xl font-black text-sm tracking-widest uppercase shadow-lg shadow-indigo-500/20 transition-all active:scale-95 flex items-center justify-center gap-3">
                    <span>Generate AI Analysis</span>
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                </button>
            </form>

            <div id="result" class="hidden mt-12 space-y-6 animate-fadeIn">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-indigo-600 p-8 rounded-[2rem] relative overflow-hidden group">
                        <div class="absolute -right-4 -top-4 w-24 h-24 bg-white/10 rounded-full blur-2xl group-hover:scale-150 transition-transform"></div>
                        <p class="text-[10px] font-black uppercase tracking-widest opacity-70">Semantic Fit</p>
                        <h3 id="score" class="text-5xl font-black mt-2">--%</h3>
                    </div>
                    <div class="bg-slate-800 border border-slate-700 p-8 rounded-[2rem]">
                        <p class="text-[10px] font-black uppercase tracking-widest text-slate-500">Industry Prediction</p>
                        <h3 id="role" class="text-2xl font-bold mt-2 text-indigo-400 truncate">--</h3>
                    </div>
                </div>

                <div class="bg-slate-900/50 border border-slate-800 p-8 rounded-[2rem]">
                    <div class="flex items-center justify-between mb-4">
                        <p class="text-[10px] font-black uppercase tracking-widest text-indigo-400">Skill Gap Identification</p>
                        <span class="w-2 h-2 bg-indigo-500 rounded-full animate-ping"></span>
                    </div>
                    <div id="skillGaps" class="flex flex-wrap gap-3">
                        </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="mt-16 text-slate-600 text-[10px] uppercase tracking-[0.4em] font-bold">
        Neural Engine v2.4 // Chandigarh University Symposium Ed.
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
